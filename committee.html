<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Committee Dashboard | SafeCampus</title>
    <style>
        
        .emergency-row { animation: blink 2s infinite; }
        @keyframes blink {
            0% { background-color: #1e293b; }
            50% { background-color: #450a0a; }
            100% { background-color: #1e293b; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 p-6 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Internal Grievance Portal</h1>
                <p class="text-xs text-slate-400 font-medium">IIIT Hyderabad Committee Access Only</p>
            </div>
            <div class="flex items-center gap-4">
                <a href="/logout" class="text-sm font-mono text-slate-300 hover:text-white">Logout</a>
                <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-sm font-mono text-slate-300">SERVER_ACTIVE</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-4">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest px-2">Recent Reports</h2>
            {% if data %}
            <div id="caseList" class="space-y-3">
                {% for c in data %}
                <div onclick="openAdminChat('{{c.key}}')" 
                     class="p-4 rounded-2xl cursor-pointer border border-slate-700 transition transform hover:scale-[1.01] {% if 'EMERGENCY' in c.cat and 'Resolved' not in c.status %}emergency-row border-red-900{% else %}bg-slate-800 hover:bg-slate-700{% endif %}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-mono font-bold {% if 'EMERGENCY' in c.cat and 'Resolved' not in c.status %}text-red-400{% else %}text-indigo-300{% endif %}">{{c.key}}</span>
                        <span class="text-[10px] px-2 py-0.5 rounded-md font-bold {% if 'Resolved' in c.status %}bg-emerald-500/20 text-emerald-400{% else %}bg-slate-700 text-slate-300{% endif %}">{{c.status}}</span>
                    </div>
                    <p class="text-xs text-slate-400 truncate">{{c.cat}}</p>
                    <p class="text-xs text-slate-500 truncate">{{c.timestamp}}</p>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div id="caseList" class="space-y-3">
            </div>
            {% endif %}
        </div>

        <div id="adminChatArea" class="lg:col-span-2 hidden bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl overflow-hidden flex flex-col h-[78vh]">
            
            <div class="p-6 bg-slate-700/50 border-b border-slate-600 flex justify-between items-center">
                <div>
                    <h2 id="activeCaseTitle" class="text-xl font-bold text-indigo-400"></h2>
                    <p id="activeCaseStatus" class="text-xs text-slate-400 font-mono"></p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="resolveCase()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition-all shadow-lg shadow-emerald-900/20">
                        MARK AS RESOLVED
                    </button>
                    <div id="mapsButtonArea"></div>
                </div>
            </div>

            <div id="adminMessages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-900/30">
                </div>

            <div class="p-6 bg-slate-800 border-t border-slate-700">
                <div class="flex gap-3">
                    <input id="adminMsgInput" type="text" class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition" placeholder="Type a response to the student...">
                    <button onclick="adminSend()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-indigo-900/20">Send Reply</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPopup(title, message, isConfirm = false) {
            return new Promise((resolve) => {
                document.getElementById('popup-title').innerText = title;
                document.getElementById('popup-message').innerText = message;
                document.getElementById('custom-popup').classList.remove('hidden');

                const okButton = document.getElementById('popup-ok');
                const cancelButton = document.getElementById('popup-cancel');

                okButton.onclick = () => {
                    document.getElementById('custom-popup').classList.add('hidden');
                    resolve(true);
                };

                if (isConfirm) {
                    cancelButton.classList.remove('hidden');
                    cancelButton.onclick = () => {
                        document.getElementById('custom-popup').classList.add('hidden');
                        resolve(false);
                    };
                } else {
                    cancelButton.classList.add('hidden');
                }
            });
        }

        async function showAlert(title, message) {
            await showPopup(title, message);
        }

        async function showConfirm(title, message) {
            return await showPopup(title, message, true);
        }

        let currentAdminCase = '';

        // 1. Fetch all reports to display in the sidebar
        async function loadAll() {
            const res = await fetch('/api/admin/all');
            const data = await res.json();
            console.log(data); // for debugging
            const list = document.getElementById('caseList');
            if (data.length === 0) {
                list.innerHTML = `<p class="text-slate-500 text-sm p-4">No reports found.</p>`;
                return;
            }
            
            // Show latest reports at the top
            list.innerHTML = data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).map(c => {
                const isEmergency = c.cat.includes('EMERGENCY') && !c.status.includes('Resolved');
                return `
                <div onclick="openAdminChat('${c.key}')" 
                     class="p-4 rounded-2xl cursor-pointer border border-slate-700 transition transform hover:scale-[1.01] ${isEmergency ? 'emergency-row border-red-900' : 'bg-slate-800 hover:bg-slate-700'}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-mono font-bold ${isEmergency ? 'text-red-400' : 'text-indigo-300'}">${c.key}</span>
                        <span class="text-[10px] px-2 py-0.5 rounded-md font-bold ${c.status.includes('Resolved') ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-300'}">${c.status}</span>
                    </div>
                    <p class="text-xs text-slate-400 truncate">${c.cat}</p>
                    <p class="text-xs text-slate-500 truncate">${c.timestamp}</p>
                </div>
                `;
            }).join('');
        }

        // 2. Open a specific case to view chat and location details
        async function openAdminChat(key) {
            currentAdminCase = key;
            document.getElementById('adminChatArea').classList.remove('hidden');
            
            const res = await fetch('/api/chat/' + key);
            const data = await res.json();

            document.getElementById('activeCaseTitle').innerText = key;
            document.getElementById('activeCaseStatus').innerText = "STATUS: " + data.status;

            // Handle Emergency Google Maps Link
            const mapsArea = document.getElementById('mapsButtonArea');
            if(data.description.includes('Lat')) {
                // Extracts the coordinates from the description string
                const coords = data.description.match(/Lat\s*([\d.-]+),\s*Lon\s*([\d.-]+)/);
                if(coords) {
                    mapsArea.innerHTML = `<a href="https://www.google.com/maps?q=${coords[1]},${coords[2]}" target="_blank" class="bg-red-600 text-white text-xs px-4 py-2 rounded-lg font-bold hover:bg-red-500 flex items-center gap-2">📍 VIEW MAP</a>`;
                }
            } else {
                mapsArea.innerHTML = '';
            }

            // Display the Original Incident Description
            const msgArea = document.getElementById('adminMessages');
            msgArea.innerHTML = `
                <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl mb-8 shadow-xl relative">
                    <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-tighter mb-2">Primary Grievance Detail</p>
                    <p class="text-sm leading-relaxed text-slate-200">${data.description}</p>
                    ${data.filename ? `<a href="/uploads/${data.filename}" target="_blank" class="text-indigo-400">View Attachment</a>` : ''}
                </div>
            `;

            // Display the Chat History
            data.messages.forEach(m => {
                const isAdmin = m.sender === 'Committee';
                msgArea.innerHTML += `
                    <div class="flex ${isAdmin ? 'justify-end' : 'justify-start'}">
                        <div class="${isAdmin ? 'bg-indigo-600 text-white shadow-indigo-900/20' : 'bg-slate-700 text-slate-200 border border-slate-600 shadow-slate-900/40'} p-3 rounded-2xl max-w-[85%] shadow-md">
                            <p class="text-[9px] uppercase font-bold mb-1 opacity-60">${m.sender} - ${m.timestamp}</p>
                            <p class="text-sm">${m.text}</p>
                        </div>
                    </div>
                `;
            });
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        // 3. Official reply from the Committee to the student
        async function adminSend() {
            const text = document.getElementById('adminMsgInput').value;
            if(!text) return;

            await fetch('/api/chat/' + currentAdminCase, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sender: 'Committee', text: text})
            });
            document.getElementById('adminMsgInput').value = '';
            openAdminChat(currentAdminCase);
        }

        // 4. Update the case to "Resolved" status
        async function resolveCase() {
            const confirmed = await showConfirm("Resolve Case", "Verify: Has this grievance been handled and concluded?");
            if (confirmed) {
                const res = await fetch('/api/resolve/' + currentAdminCase, {
                    method: 'POST'
                });
                if(res.ok) {
                    showAlert("Resolved!", "Case marked as Resolved.");
                    loadAll(); // Refresh the sidebar
                    openAdminChat(currentAdminCase); // Refresh current view
                }
            }
        }

        // Auto-refresh the sidebar list every 10 seconds to detect new reports
        setInterval(loadAll, 10000);
        loadAll();
    </script>
    <div id="custom-popup" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-[1000] hidden">
        <div class="bg-white p-8 rounded-lg shadow-xl max-w-sm mx-auto">
            <h3 id="popup-title" class="text-xl font-bold mb-4 text-gray-800"></h3>
            <p id="popup-message" class="text-gray-700 mb-6"></p>
            <div class="flex justify-end space-x-4">
                <button id="popup-cancel" class="px-5 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 font-semibold hidden">Cancel</button>
                <button id="popup-ok" class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
