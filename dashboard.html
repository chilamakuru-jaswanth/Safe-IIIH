<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Admin Login | SafeCampus</title>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-white tracking-tight text-center">Committee Login</h1>
        <p class="text-xs text-slate-400 font-medium text-center mb-6">Internal Access Only</p>

        {% if error %}
            <p class="bg-red-500/20 text-red-300 text-xs p-3 rounded-lg mb-4">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/admin">
            <div class="space-y-4">
                <input type="text" name="username" placeholder="Username" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition">
                <input type="password" name="password" placeholder="Password" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white outline-none focus:ring-2 focus:ring-indigo-500 transition">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-lg font-bold transition shadow-lg shadow-indigo-900/20">Login</button>
            </div>
        </form>
    </div>

</body>
</html>
