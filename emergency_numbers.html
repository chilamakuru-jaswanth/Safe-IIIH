<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-3xl shadow-2xl border border-red-50 max-w-md w-full text-center">
        <div class="flex items-center justify-center mb-8">
            <div class="bg-red-600 text-white p-3 rounded-2xl mr-4 shadow-lg shadow-red-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
            </div>
            <h3 class="text-3xl font-bold text-slate-800">Emergency Contacts</h3>
        </div>
        <div class="space-y-4">
            <a href="tel:100" class="block bg-red-100 text-red-800 p-4 rounded-lg font-bold hover:bg-red-200 transition">
                <span class="mr-2">📞</span> Police: 100
            </a>
            <a href="tel:108" class="block bg-red-100 text-red-800 p-4 rounded-lg font-bold hover:bg-red-200 transition">
                <span class="mr-2">🚑</span> Ambulance: 108
            </a>
            <a href="tel:112" class="block bg-red-100 text-red-800 p-4 rounded-lg font-bold hover:bg-red-200 transition">
                <span class="mr-2">🚨</span> All-in-one Emergency: 112
            </a>
        </div>
    </div>
</body>
</html>
